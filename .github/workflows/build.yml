# ju -- 17-Jun-26 -- build.yml
# CI bei jedem Push/PR auf main, zwei Jobs:
#   - format: clang-format-Stilcheck (--dry-run --Werror) auf einem Linux-Runner
#   - build:  alle C-/C++-Beispiele warnungsfrei bauen (-Werror) und ausfuehren
#             (Selbsttests + Absturz-Check) unter macOS (Apple Clang).
name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  format:
    name: clang-format-Stilcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # clang-format aus PyPI, auf dieselbe Hauptversion (22) gepinnt wie lokal
      # (Homebrew llvm) -- gleiche Version = identische Formatierung, kein CI-Drift.
      - name: clang-format 22 installieren
        run: pipx install "clang-format==22.*"

      # .clang-format im Repo legt den Stil fest (2 Leerzeichen, kein Tab, ...).
      # --dry-run --Werror aendert nichts, faellt aber bei jeder Abweichung aus.
      - name: Stil pruefen (--dry-run --Werror)
        run: |
          clang-format --version
          find src include \( -name '*.c' -o -name '*.cpp' -o -name '*.h' \) \
            -print0 | xargs -0 clang-format --dry-run --Werror

  build:
    name: build + run (macOS)
    runs-on: macos-latest
    timeout-minutes: 10          # Backstop, falls je ein Programm haengt
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain anzeigen
        run: cc --version

      # Stufe 2: Warnungen sind Fehler -> faengt drohende Bugs schon beim Bauen ab
      - name: Alle Beispiele bauen (warnungsfrei, -Werror)
        run: make EXTRA_WARN=-Werror

      # Stufe 1: jedes Programm ausfuehren; Exit != 0 (Absturz oder fehl-
      # geschlagener Selbsttest, z. B. class-person-v02) laesst den Lauf fehlschlagen.
      # stdin von /dev/null -> kein Blockieren, .dSYM-Verzeichnisse werden uebersprungen.
      - name: Beispiele ausfuehren (Selbsttests + Absturz-Check)
        run: |
          for prog in bin/*; do
            [ -f "$prog" ] && [ -x "$prog" ] || continue
            echo "== $prog =="
            "$prog" </dev/null
          done
